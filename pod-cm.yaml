apiVersion: v1
kind: Pod
metadata:
  name: pod-cm
spec:
  containers:
  - name: nginx
    image: nginx
    env:
    - name: DATA_MENSAJE
      valueFrom:
        configMapKeyRef:
          name: miconfig
          key: MENSAJE
    - name: DATA_PATH
      valueFrom:
        configMapKeyRef:
          name: miconfig
          key: PATH
